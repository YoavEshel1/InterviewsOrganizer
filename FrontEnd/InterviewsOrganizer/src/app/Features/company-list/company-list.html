<div class="container">
    @if (loadingCompanies()) {
    <p>Loading companies...</p>
    } @else {
    <div cdkDropList class="company-list" (cdkDropListDropped)="drop($event)">
        @for (company of companies(); track company.id) {
         <app-company-item [company]="company" class="company-box"></app-company-item>
        }
    </div>
    }
</div>
